<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 820" font-family="'SimSun', 'Times New Roman', serif">
  <rect id="bg" x="0" y="0" width="780" height="820" fill="#fff"/>
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#000"/>
    </marker>
  </defs>
  <style>
    text { fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .hl  { fill: #e8e8e8; stroke: #000; stroke-width: 1.5; }
    .code { fill: #f4f4f4; stroke: #999; stroke-width: 1; }
    .title { font-size: 16px; font-weight: bold; }
    .name { font-size: 13px; font-weight: bold; }
    .sub  { font-size: 11px; }
    .formula { font-size: 12px; font-style: italic; }
    .c { font-size: 11px; font-family: 'Consolas', 'Courier New', monospace; fill: #003366; }
    .comment { font-size: 10px; font-family: 'Consolas', 'Courier New', monospace; fill: #888; }
    .tag { font-size: 10px; font-family: 'Consolas', 'Courier New', monospace; fill: #006633; }
    .line { stroke: #000; stroke-width: 1.2; fill: none; }
  </style>

  <text x="390" y="28" text-anchor="middle" class="title">一维卡尔曼滤波算法流程图（对应 kalman.c 实现）</text>

  <!-- ========== 初始化 ========== -->
  <rect x="180" y="48" width="420" height="64" rx="20" class="hl"/>
  <text x="390" y="68" text-anchor="middle" class="name">初始化 kalman_init(kf, Q, R, init_val)</text>
  <text x="200" y="86" class="c">kf-&gt;x = init_val;  kf-&gt;p = 1.0f;</text>
  <text x="200" y="102" class="c">kf-&gt;q = Q;  kf-&gt;r = R;  kf-&gt;k = 0.0f;</text>

  <line x1="390" y1="112" x2="390" y2="132" class="line" marker-end="url(#ar)"/>

  <!-- ========== 采样周期 ========== -->
  <rect x="180" y="134" width="420" height="48" rx="20" class="hl"/>
  <text x="390" y="154" text-anchor="middle" class="name">主循环新采样周期 k</text>
  <text x="200" y="172" class="c">dt = (HAL_GetTick() - last_tick) / 1000.0f;</text>

  <line x1="390" y1="182" x2="390" y2="202" class="line" marker-end="url(#ar)"/>

  <!-- ========== 预测阶段标签 ========== -->
  <rect x="22" y="228" width="120" height="30" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="82" y="248" text-anchor="middle" class="name">预测阶段</text>
  <line x1="142" y1="243" x2="180" y2="243" class="line" stroke-dasharray="3,3"/>

  <!-- Step 1: 状态预测 -->
  <rect x="180" y="204" width="420" height="78" class="box"/>
  <text x="190" y="222" class="name">① 状态预测</text>
  <text x="390" y="238" text-anchor="middle" class="formula">x̂ₖ⁻ = x̂ₖ₋₁ + ω · Δt</text>
  <rect x="192" y="248" width="396" height="24" class="code"/>
  <text x="200" y="265" class="c">kf-&gt;x = kf-&gt;x + gyro_rate * dt;</text>
  <text x="500" y="265" class="comment">/* 预测步 */</text>

  <line x1="390" y1="282" x2="390" y2="300" class="line" marker-end="url(#ar)"/>

  <!-- Step 2: 协方差预测 -->
  <rect x="180" y="302" width="420" height="78" class="box"/>
  <text x="190" y="320" class="name">② 先验误差协方差预测</text>
  <text x="390" y="336" text-anchor="middle" class="formula">Pₖ⁻ = Pₖ₋₁ + Q</text>
  <rect x="192" y="346" width="396" height="24" class="code"/>
  <text x="200" y="363" class="c">kf-&gt;p = kf-&gt;p + kf-&gt;q;</text>
  <text x="500" y="363" class="comment">/* 预测步 */</text>

  <line x1="390" y1="380" x2="390" y2="398" class="line" marker-end="url(#ar)"/>

  <!-- ========== 更新阶段标签 ========== -->
  <rect x="22" y="446" width="120" height="30" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="82" y="466" text-anchor="middle" class="name">更新阶段</text>
  <line x1="142" y1="461" x2="180" y2="461" class="line" stroke-dasharray="3,3"/>

  <!-- Step 3: 卡尔曼增益 -->
  <rect x="180" y="400" width="420" height="78" class="box"/>
  <text x="190" y="418" class="name">③ 计算卡尔曼增益</text>
  <text x="390" y="434" text-anchor="middle" class="formula">Kₖ = Pₖ⁻ / (Pₖ⁻ + R)</text>
  <rect x="192" y="444" width="396" height="24" class="code"/>
  <text x="200" y="461" class="c">kf-&gt;k = kf-&gt;p / (kf-&gt;p + kf-&gt;r);</text>
  <text x="500" y="461" class="comment">/* 更新步 */</text>

  <line x1="390" y1="478" x2="390" y2="496" class="line" marker-end="url(#ar)"/>

  <!-- Step 4: 状态更新 -->
  <rect x="180" y="498" width="420" height="78" class="box"/>
  <text x="190" y="516" class="name">④ 状态更新（后验估计）</text>
  <text x="390" y="532" text-anchor="middle" class="formula">x̂ₖ = x̂ₖ⁻ + Kₖ · (zₖ − x̂ₖ⁻)</text>
  <rect x="192" y="542" width="396" height="24" class="code"/>
  <text x="200" y="559" class="c">kf-&gt;x = kf-&gt;x + kf-&gt;k * (measure - kf-&gt;x);</text>

  <line x1="390" y1="576" x2="390" y2="594" class="line" marker-end="url(#ar)"/>

  <!-- Step 5: 协方差更新 -->
  <rect x="180" y="596" width="420" height="78" class="box"/>
  <text x="190" y="614" class="name">⑤ 误差协方差更新</text>
  <text x="390" y="630" text-anchor="middle" class="formula">Pₖ = (1 − Kₖ) · Pₖ⁻</text>
  <rect x="192" y="640" width="396" height="24" class="code"/>
  <text x="200" y="657" class="c">kf-&gt;p = (1.0f - kf-&gt;k) * kf-&gt;p;</text>
  <text x="500" y="657" class="comment">/* 更新步 */</text>

  <line x1="390" y1="674" x2="390" y2="692" class="line" marker-end="url(#ar)"/>

  <!-- 输出 -->
  <rect x="180" y="694" width="420" height="48" class="hl"/>
  <text x="390" y="714" text-anchor="middle" class="name">输出滤波后的状态估计 x̂ₖ</text>
  <text x="200" y="732" class="c">return kf-&gt;x;</text>

  <!-- 回路箭头: 输出 → 右侧 → 回到"新采样周期" -->
  <line x1="600" y1="718" x2="700" y2="718" class="line"/>
  <line x1="700" y1="718" x2="700" y2="158" class="line"/>
  <line x1="700" y1="158" x2="600" y2="158" class="line" marker-end="url(#ar)"/>
  <text x="708" y="440" text-anchor="start" class="sub">k = k+1</text>

  <!-- 函数签名标签 -->
  <text x="720" y="340" text-anchor="start" class="tag" transform="rotate(-90,720,340)">kalman_update() — 姿态角（带预测）</text>
  <text x="752" y="490" text-anchor="start" class="tag" transform="rotate(-90,752,490)">kalman_update_simple() — 角速度（①跳过，x保持不变）</text>

  <!-- 底部注释框: 参数配置 -->
  <rect x="22" y="760" width="736" height="52" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="390" y="778" text-anchor="middle" class="name">参数配置（见 demo.c:83-93）</text>
  <text x="34" y="796" class="sub">姿态角 (kf_roll/pitch/yaw)：Q=0.001, R=0.1, x₀=0.0, P₀=1.0      角速度 (kf_gyro_x/y/z)：Q=0.01, R=0.05, x₀=0.0, P₀=1.0</text>
  <text x="34" y="810" class="sub">zₖ: 传感器观测值      ω: 陀螺仪角速度 (deg/s)      Δt: 采样间隔 ≈ 5ms (HAL_GetTick 动态测量)</text>

</svg>
