<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="'SimSun', 'Times New Roman', serif">
  <rect id="bg" x="0" y="0" width="700" height="460" fill="#fff"/>
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#000"/>
    </marker>
  </defs>
  <style>
    text { fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .hl  { fill: #e8e8e8; stroke: #000; stroke-width: 1.5; }
    .dia { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .title { font-size: 16px; font-weight: bold; }
    .name { font-size: 13px; font-weight: bold; }
    .sub  { font-size: 11px; }
    .line { stroke: #000; stroke-width: 1.2; fill: none; }
  </style>

  <text x="350" y="28" text-anchor="middle" class="title">图 3.9  MS901M 姿态数据采集流程图</text>

  <!-- Step 1 -->
  <rect x="220" y="50" width="260" height="38" rx="18" class="hl"/>
  <text x="350" y="74" text-anchor="middle" class="name">主循环调用</text>

  <line x1="350" y1="88" x2="350" y2="110" class="line" marker-end="url(#ar)"/>

  <!-- Step 2: 读取姿态 -->
  <rect x="220" y="112" width="260" height="44" class="box"/>
  <text x="350" y="130" text-anchor="middle" class="name">atk_ms901m_get_attitude()</text>
  <text x="350" y="146" text-anchor="middle" class="sub">5ms 超时，非阻塞读取</text>

  <line x1="350" y1="156" x2="350" y2="178" class="line" marker-end="url(#ar)"/>

  <!-- Step 3: 判断 -->
  <polygon points="350,180 430,210 350,240 270,210" class="dia"/>
  <text x="350" y="214" text-anchor="middle" class="sub">成功?</text>

  <!-- 失败 → 右侧 -->
  <line x1="430" y1="210" x2="510" y2="210" class="line" marker-end="url(#ar)"/>
  <text x="468" y="202" text-anchor="middle" class="sub">否</text>
  <rect x="512" y="194" width="130" height="32" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="577" y="214" text-anchor="middle" class="sub">跳过，等下一周期</text>

  <!-- 成功 → 下 -->
  <line x1="350" y1="240" x2="350" y2="262" class="line" marker-end="url(#ar)"/>
  <text x="335" y="254" text-anchor="end" class="sub">是</text>

  <!-- Step 4: 解析数据 -->
  <rect x="220" y="264" width="260" height="44" class="box"/>
  <text x="350" y="282" text-anchor="middle" class="name">解析姿态帧</text>
  <text x="350" y="298" text-anchor="middle" class="sub">Roll / Pitch / Yaw + GyroX/Y/Z</text>

  <line x1="350" y1="308" x2="350" y2="330" class="line" marker-end="url(#ar)"/>

  <!-- Step 5: 写寄存器 -->
  <rect x="220" y="332" width="260" height="44" class="box"/>
  <text x="350" y="350" text-anchor="middle" class="name">写入 Modbus 姿态寄存器</text>
  <text x="350" y="366" text-anchor="middle" class="sub">modbus_set_register_float()</text>

  <line x1="350" y1="376" x2="350" y2="398" class="line" marker-end="url(#ar)"/>

  <!-- Step 6: 读气压 -->
  <rect x="220" y="400" width="260" height="44" class="hl"/>
  <text x="350" y="418" text-anchor="middle" class="name">atk_ms901m_get_barometer()</text>
  <text x="350" y="434" text-anchor="middle" class="sub">气压 / 海拔 / 温度 → 寄存器 0x0048</text>

  <!-- 左侧注释 -->
  <rect x="20" y="260" width="180" height="80" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="110" y="282" text-anchor="middle" class="name">数据格式</text>
  <line x1="30" y1="288" x2="190" y2="288" class="line"/>
  <text x="30" y="306" class="sub">IEEE 754 单精度浮点</text>
  <text x="30" y="322" class="sub">大端字序，每值 2 寄存器</text>
  <polyline points="200,300 210,300 210,290 220,290" class="line" stroke-dasharray="3,3"/>
</svg>
