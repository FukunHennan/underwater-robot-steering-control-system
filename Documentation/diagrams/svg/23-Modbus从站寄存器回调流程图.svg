<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="'SimSun', 'Times New Roman', serif">
  <rect id="bg" x="0" y="0" width="820" height="600" fill="#fff"/>
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#000"/>
    </marker>
  </defs>
  <style>
    text { fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .hl  { fill: #e8e8e8; stroke: #000; stroke-width: 1.5; }
    .dia { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .title { font-size: 16px; font-weight: bold; }
    .name { font-size: 13px; font-weight: bold; }
    .sub  { font-size: 11px; }
    .line { stroke: #000; stroke-width: 1.2; fill: none; }
  </style>

  <text x="380" y="28" text-anchor="middle" class="title">图 3.12  Modbus 从站寄存器回调流程图</text>

  <!-- Step 1: 接收请求 -->
  <rect x="250" y="48" width="260" height="38" class="box"/>
  <text x="380" y="72" text-anchor="middle" class="name">USART2 接收 Modbus 请求帧</text>

  <line x1="380" y1="86" x2="380" y2="108" class="line" marker-end="url(#ar)"/>

  <!-- Step 2: eMBPoll -->
  <rect x="250" y="110" width="260" height="44" class="hl"/>
  <text x="380" y="128" text-anchor="middle" class="name">eMBPoll() 处理协议栈事件</text>
  <text x="380" y="144" text-anchor="middle" class="sub">FreeModbus 解析帧头 + CRC 校验</text>

  <line x1="380" y1="154" x2="380" y2="176" class="line" marker-end="url(#ar)"/>

  <!-- Step 3: 功能码判断 -->
  <polygon points="380,178 470,213 380,248 290,213" class="dia"/>
  <text x="380" y="217" text-anchor="middle" class="sub">功能码?</text>

  <!-- FC03 读 → 左下 -->
  <line x1="290" y1="213" x2="180" y2="213" class="line"/>
  <line x1="180" y1="213" x2="180" y2="278" class="line" marker-end="url(#ar)"/>
  <text x="230" y="205" text-anchor="middle" class="sub">FC03 读</text>

  <!-- FC06/FC16 写 → 右下 -->
  <line x1="470" y1="213" x2="580" y2="213" class="line"/>
  <line x1="580" y1="213" x2="580" y2="278" class="line" marker-end="url(#ar)"/>
  <text x="530" y="205" text-anchor="middle" class="sub">FC06/FC16 写</text>

  <!-- 左分支: 读取 -->
  <rect x="60" y="280" width="240" height="44" class="box"/>
  <text x="180" y="298" text-anchor="middle" class="name">读取寄存器数组</text>
  <text x="180" y="314" text-anchor="middle" class="sub">g_modbus_registers[addr]</text>

  <line x1="180" y1="324" x2="180" y2="354" class="line" marker-end="url(#ar)"/>

  <rect x="60" y="356" width="240" height="38" class="hl"/>
  <text x="180" y="380" text-anchor="middle" class="name">构建响应帧，返回数据</text>

  <!-- 右分支: 写入 -->
  <rect x="460" y="280" width="240" height="38" class="box"/>
  <text x="580" y="304" text-anchor="middle" class="name">检查写权限</text>

  <line x1="580" y1="318" x2="580" y2="340" class="line" marker-end="url(#ar)"/>

  <!-- 写权限判断 -->
  <polygon points="580,342 650,367 580,392 510,367" class="dia"/>
  <text x="580" y="371" text-anchor="middle" class="sub">可写?</text>

  <!-- 不可写 → 右侧 -->
  <line x1="650" y1="367" x2="720" y2="367" class="line" marker-end="url(#ar)"/>
  <text x="682" y="358" text-anchor="middle" class="sub">否</text>
  <text x="726" y="371" text-anchor="start" class="sub">异常 0x02</text>

  <!-- 可写 → 向下 -->
  <line x1="580" y1="392" x2="580" y2="418" class="line" marker-end="url(#ar)"/>
  <text x="565" y="410" text-anchor="end" class="sub">是</text>

  <!-- 写入寄存器 -->
  <rect x="460" y="420" width="240" height="38" class="box"/>
  <text x="580" y="444" text-anchor="middle" class="name">写入寄存器值</text>

  <line x1="580" y1="458" x2="580" y2="480" class="line" marker-end="url(#ar)"/>

  <!-- apply_register -->
  <rect x="460" y="482" width="240" height="44" class="hl"/>
  <text x="580" y="500" text-anchor="middle" class="name">apply_register(addr)</text>
  <text x="580" y="516" text-anchor="middle" class="sub">自动应用到硬件</text>

  <!-- 底部: 硬件动作 -->
  <line x1="580" y1="526" x2="580" y2="540" class="line"/>
  <line x1="435" y1="540" x2="685" y2="540" class="line"/>
  <line x1="435" y1="540" x2="435" y2="550" class="line" marker-end="url(#ar)"/>
  <line x1="565" y1="540" x2="565" y2="550" class="line" marker-end="url(#ar)"/>
  <line x1="685" y1="540" x2="685" y2="550" class="line" marker-end="url(#ar)"/>

  <rect x="370" y="550" width="130" height="38" class="box"/>
  <text x="435" y="574" text-anchor="middle" class="sub">PWM 占空比</text>

  <rect x="510" y="550" width="110" height="38" class="box"/>
  <text x="565" y="574" text-anchor="middle" class="sub">LED 亮度</text>

  <rect x="630" y="550" width="110" height="38" class="box"/>
  <text x="685" y="574" text-anchor="middle" class="sub">PWM 频率</text>

  <!-- 左侧注释 -->
  <rect x="16" y="410" width="190" height="90" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="111" y="430" text-anchor="middle" class="name">可写寄存器范围</text>
  <line x1="26" y1="436" x2="196" y2="436" class="line"/>
  <text x="26" y="454" class="sub">0x0002  运行模式</text>
  <text x="26" y="470" class="sub">0x0020~0x0029  PWM</text>
  <text x="26" y="486" class="sub">0x0040~0x0047  频率</text>
  <polyline points="206,450 330,450 330,300 460,300" class="line" stroke-dasharray="3,3"/>
</svg>
