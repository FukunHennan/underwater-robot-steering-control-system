<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'SimSun', 'Times New Roman', serif">
  <rect id="bg" x="0" y="0" width="800" height="480" fill="#fff"/>
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#000"/>
    </marker>
    <marker id="arl" markerWidth="12" markerHeight="12" refX="1" refY="6" orient="auto">
      <path d="M12,0 L0,6 L12,12 z" fill="#000"/>
    </marker>
  </defs>
  <style>
    text { fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .hl  { fill: #e8e8e8; stroke: #000; stroke-width: 1.5; }
    .title { font-size: 16px; font-weight: bold; }
    .name { font-size: 13px; font-weight: bold; }
    .sub  { font-size: 11px; }
    .line { stroke: #000; stroke-width: 1.2; fill: none; }
  </style>

  <text x="400" y="28" text-anchor="middle" class="title">图 2.1  系统硬件总体架构</text>

  <!-- 中心: STM32 主控 -->
  <rect x="280" y="180" width="240" height="80" class="hl"/>
  <text x="400" y="210" text-anchor="middle" class="name">STM32F407VET6 主控</text>
  <text x="400" y="230" text-anchor="middle" class="sub">ARM Cortex-M4  168MHz  FPU</text>
  <text x="400" y="248" text-anchor="middle" class="sub">USART × 3 / TIM × 4 / ADC × 1</text>

  <!-- 左上: 姿态传感器 -->
  <rect x="40" y="60" width="200" height="60" class="box"/>
  <text x="140" y="85" text-anchor="middle" class="name">ATK-MS901M</text>
  <text x="140" y="102" text-anchor="middle" class="sub">九轴姿态传感器 (USART3)</text>
  <polyline points="240,90 260,90 260,220 280,220" class="line" marker-end="url(#ar)"/>
  <text x="270" y="155" class="sub">姿态数据</text>

  <!-- 右上: 上位机 -->
  <rect x="560" y="60" width="200" height="60" class="box"/>
  <text x="660" y="85" text-anchor="middle" class="name">上位机 Web Dashboard</text>
  <text x="660" y="102" text-anchor="middle" class="sub">Modbus RTU (USART2)</text>
  <line x1="520" y1="200" x2="550" y2="200" class="line" marker-start="url(#arl)"/>
  <line x1="550" y1="200" x2="550" y2="90" class="line"/>
  <line x1="550" y1="90" x2="560" y2="90" class="line" marker-end="url(#ar)"/>
  <text x="528" y="155" text-anchor="end" class="sub">读写寄存器</text>

  <!-- 左下: ADC 传感器 -->
  <rect x="40" y="340" width="200" height="60" class="box"/>
  <text x="140" y="365" text-anchor="middle" class="name">ADC 传感器接口</text>
  <text x="140" y="382" text-anchor="middle" class="sub">4路模拟量 + 电压检测</text>
  <polyline points="240,370 260,370 260,240 280,240" class="line" marker-end="url(#ar)"/>
  <text x="270" y="310" class="sub">ADC-DMA</text>

  <!-- 右下: PWM 执行器 -->
  <rect x="560" y="340" width="200" height="60" class="box"/>
  <text x="660" y="365" text-anchor="middle" class="name">执行器系统</text>
  <text x="660" y="382" text-anchor="middle" class="sub">8路舵机 + 2路LED</text>
  <polyline points="520,240 540,240 540,370 560,370" class="line" marker-end="url(#ar)"/>
  <text x="528" y="310" text-anchor="end" class="sub">PWM输出</text>

  <!-- 底部: 电源 -->
  <rect x="280" y="420" width="240" height="48" class="box"/>
  <text x="400" y="440" text-anchor="middle" class="name">电源系统</text>
  <text x="400" y="456" text-anchor="middle" class="sub">LM2596S 降压 → AMS1117-3.3 稳压</text>
  <line x1="400" y1="420" x2="400" y2="260" class="line" stroke-dasharray="5,3"/>
  <text x="416" y="345" class="sub">供电</text>

  <!-- 调试串口 -->
  <rect x="280" y="60" width="240" height="40" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="400" y="85" text-anchor="middle" class="sub">USART1 调试串口 (115200bps)</text>
  <line x1="400" y1="100" x2="400" y2="180" class="line" stroke-dasharray="3,3"/>
</svg>
