<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="'SimSun', 'Times New Roman', serif">
  <rect id="bg" x="0" y="0" width="700" height="480" fill="#fff"/>
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#000"/>
    </marker>
  </defs>
  <style>
    text { fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .hl  { fill: #e8e8e8; stroke: #000; stroke-width: 1.5; }
    .dia { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .title { font-size: 16px; font-weight: bold; }
    .name { font-size: 13px; font-weight: bold; }
    .sub  { font-size: 11px; }
    .line { stroke: #000; stroke-width: 1.2; fill: none; }
  </style>

  <text x="350" y="28" text-anchor="middle" class="title">图 3.10  PWM 控制流程图</text>

  <!-- Step 1 -->
  <rect x="210" y="50" width="280" height="38" class="box"/>
  <text x="350" y="74" text-anchor="middle" class="name">Modbus 写寄存器请求到达</text>

  <line x1="350" y1="88" x2="350" y2="110" class="line" marker-end="url(#ar)"/>

  <!-- Step 2: apply_register -->
  <rect x="210" y="112" width="280" height="38" class="hl"/>
  <text x="350" y="136" text-anchor="middle" class="name">apply_register(addr) 自动调用</text>

  <line x1="350" y1="150" x2="350" y2="172" class="line" marker-end="url(#ar)"/>

  <!-- Step 3: 地址判断 -->
  <polygon points="350,174 440,209 350,244 260,209" class="dia"/>
  <text x="350" y="213" text-anchor="middle" class="sub">寄存器地址?</text>

  <!-- 分支: SERVO -->
  <line x1="260" y1="209" x2="120" y2="209" class="line"/>
  <line x1="120" y1="209" x2="120" y2="268" class="line" marker-end="url(#ar)"/>
  <text x="180" y="200" text-anchor="middle" class="sub">0x0020~0x0027</text>

  <rect x="30" y="270" width="180" height="44" class="box"/>
  <text x="120" y="288" text-anchor="middle" class="name">pwm_set_duty()</text>
  <text x="120" y="304" text-anchor="middle" class="sub">更新舵机占空比</text>

  <!-- 分支: LED -->
  <line x1="350" y1="244" x2="350" y2="268" class="line" marker-end="url(#ar)"/>
  <text x="368" y="260" class="sub">0x0028~0x0029</text>

  <rect x="260" y="270" width="180" height="44" class="box"/>
  <text x="350" y="288" text-anchor="middle" class="name">pwm_set_duty()</text>
  <text x="350" y="304" text-anchor="middle" class="sub">更新 LED 亮度</text>

  <!-- 分支: 频率 -->
  <line x1="440" y1="209" x2="580" y2="209" class="line"/>
  <line x1="580" y1="209" x2="580" y2="268" class="line" marker-end="url(#ar)"/>
  <text x="515" y="200" text-anchor="middle" class="sub">0x0040~0x0047</text>

  <rect x="490" y="270" width="180" height="44" class="box"/>
  <text x="580" y="288" text-anchor="middle" class="name">pwm_set_frequency()</text>
  <text x="580" y="304" text-anchor="middle" class="sub">更新定时器 ARR/PSC</text>

  <!-- 汇合 -->
  <line x1="120" y1="314" x2="120" y2="350" class="line"/>
  <line x1="350" y1="314" x2="350" y2="350" class="line"/>
  <line x1="580" y1="314" x2="580" y2="350" class="line"/>
  <line x1="120" y1="350" x2="580" y2="350" class="line"/>
  <line x1="350" y1="350" x2="350" y2="372" class="line" marker-end="url(#ar)"/>

  <!-- Step 4: 硬件更新 -->
  <rect x="210" y="374" width="280" height="38" class="hl"/>
  <text x="350" y="398" text-anchor="middle" class="name">定时器比较寄存器立即更新</text>

  <!-- 底部注释 -->
  <rect x="130" y="430" width="440" height="40" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="350" y="455" text-anchor="middle" class="sub">定时器分组: TIM4(CH1-4) / TIM8(CH5-6) / TIM3(CH7-8) / TIM1(LED1-2)</text>
</svg>
