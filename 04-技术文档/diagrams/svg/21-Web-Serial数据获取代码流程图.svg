<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="'SimSun', 'Times New Roman', serif">
  <rect id="bg" x="0" y="0" width="800" height="580" fill="#fff"/>
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#000"/>
    </marker>
  </defs>
  <style>
    text { fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .hl  { fill: #e8e8e8; stroke: #000; stroke-width: 1.5; }
    .dia { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .title { font-size: 16px; font-weight: bold; }
    .name { font-size: 13px; font-weight: bold; }
    .sub  { font-size: 11px; }
    .line { stroke: #000; stroke-width: 1.2; fill: none; }
  </style>

  <text x="380" y="28" text-anchor="middle" class="title">图 3.2  Web Serial 数据获取流程图</text>

  <!-- Step 1: 连接串口 -->
  <rect x="250" y="48" width="260" height="44" class="box"/>
  <text x="380" y="66" text-anchor="middle" class="name">用户点击 "连接" 按钮</text>
  <text x="380" y="82" text-anchor="middle" class="sub">navigator.serial.requestPort()</text>

  <line x1="380" y1="92" x2="380" y2="114" class="line" marker-end="url(#ar)"/>

  <!-- Step 2: 打开串口 -->
  <rect x="250" y="116" width="260" height="44" class="box"/>
  <text x="380" y="134" text-anchor="middle" class="name">打开串口 9600 8N1</text>
  <text x="380" y="150" text-anchor="middle" class="sub">获取 reader / writer 读写流</text>

  <line x1="380" y1="160" x2="380" y2="182" class="line" marker-end="url(#ar)"/>

  <!-- Step 3: 轮询开始 -->
  <rect x="250" y="184" width="260" height="38" rx="18" class="hl"/>
  <text x="380" y="208" text-anchor="middle" class="name">轮询定时器触发</text>

  <line x1="380" y1="222" x2="380" y2="244" class="line" marker-end="url(#ar)"/>

  <!-- Step 4: 构建请求帧 -->
  <rect x="250" y="246" width="260" height="44" class="box"/>
  <text x="380" y="264" text-anchor="middle" class="name">构建 Modbus FC03 请求帧</text>
  <text x="380" y="280" text-anchor="middle" class="sub">从站地址 + 功能码 + 寄存器地址 + CRC16</text>

  <line x1="380" y1="290" x2="380" y2="312" class="line" marker-end="url(#ar)"/>

  <!-- Step 5: 发送 -->
  <rect x="250" y="314" width="260" height="38" class="box"/>
  <text x="380" y="338" text-anchor="middle" class="name">writer.write() 发送请求</text>

  <line x1="380" y1="352" x2="380" y2="374" class="line" marker-end="url(#ar)"/>

  <!-- Step 6: 等待响应 (菱形) -->
  <polygon points="380,376 460,406 380,436 300,406" class="dia"/>
  <text x="380" y="410" text-anchor="middle" class="sub">响应超时?</text>

  <!-- 超时 → 右侧错误处理 -->
  <line x1="460" y1="406" x2="540" y2="406" class="line" marker-end="url(#ar)"/>
  <text x="495" y="398" text-anchor="middle" class="sub">是</text>
  <rect x="542" y="386" width="160" height="38" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="622" y="410" text-anchor="middle" class="sub">错误处理，等待下次轮询</text>

  <!-- 正常 → 向下 -->
  <line x1="380" y1="436" x2="380" y2="458" class="line" marker-end="url(#ar)"/>
  <text x="365" y="450" text-anchor="end" class="sub">否</text>

  <!-- Step 7: CRC校验 + 解析 -->
  <rect x="250" y="460" width="260" height="44" class="box"/>
  <text x="380" y="478" text-anchor="middle" class="name">CRC16 校验 + 解析响应数据</text>
  <text x="380" y="494" text-anchor="middle" class="sub">regsToFloat() / regsToInt32()</text>

  <line x1="380" y1="504" x2="380" y2="526" class="line" marker-end="url(#ar)"/>

  <!-- Step 8: 更新 UI -->
  <rect x="250" y="528" width="260" height="38" class="hl"/>
  <text x="380" y="552" text-anchor="middle" class="name">更新 React 状态 → UI 刷新</text>

  <!-- 回环箭头: 从 Step 8 回到 Step 3 -->
  <polyline points="510,547 700,547 700,203 510,203" class="line" marker-end="url(#ar)"/>
  <text x="712" y="380" class="sub">下一组</text>
  <text x="712" y="395" class="sub">寄存器</text>

  <!-- 左侧注释: 轮询寄存器组 -->
  <rect x="16" y="230" width="210" height="110" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="121" y="252" text-anchor="middle" class="name">5 组轮询寄存器</text>
  <line x1="26" y1="258" x2="216" y2="258" class="line"/>
  <text x="26" y="276" class="sub">① 系统寄存器 0x0000</text>
  <text x="26" y="292" class="sub">② 姿态寄存器 0x0010</text>
  <text x="26" y="308" class="sub">③ PWM 寄存器 0x0020</text>
  <text x="26" y="324" class="sub">④ ADC 寄存器 0x0030</text>
  <polyline points="226,280 238,280 238,268 250,268" class="line" stroke-dasharray="3,3"/>
</svg>
