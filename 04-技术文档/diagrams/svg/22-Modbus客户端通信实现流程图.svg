<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="'SimSun', 'Times New Roman', serif">
  <rect id="bg" x="0" y="0" width="720" height="560" fill="#fff"/>
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#000"/>
    </marker>
  </defs>
  <style>
    text { fill: #000; }
    .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .hl  { fill: #e8e8e8; stroke: #000; stroke-width: 1.5; }
    .dia { fill: #fff; stroke: #000; stroke-width: 1.5; }
    .title { font-size: 16px; font-weight: bold; }
    .name { font-size: 13px; font-weight: bold; }
    .sub  { font-size: 11px; }
    .line { stroke: #000; stroke-width: 1.2; fill: none; }
  </style>

  <text x="360" y="28" text-anchor="middle" class="title">图 3.6  Modbus 客户端通信实现流程图</text>

  <!-- Step 1: 调用入口 -->
  <rect x="220" y="48" width="280" height="44" class="box"/>
  <text x="360" y="66" text-anchor="middle" class="name">上层调用读/写方法</text>
  <text x="360" y="82" text-anchor="middle" class="sub">readAttitude() / writePWM() 等</text>

  <line x1="360" y1="92" x2="360" y2="114" class="line" marker-end="url(#ar)"/>

  <!-- Step 2: 入队 -->
  <rect x="220" y="116" width="280" height="38" class="box"/>
  <text x="360" y="140" text-anchor="middle" class="name">事务入队，等待队列锁</text>

  <line x1="360" y1="154" x2="360" y2="176" class="line" marker-end="url(#ar)"/>

  <!-- Step 3: 构建帧 -->
  <rect x="220" y="178" width="280" height="44" class="hl"/>
  <text x="360" y="196" text-anchor="middle" class="name">构建请求帧 + CRC16 校验</text>
  <text x="360" y="212" text-anchor="middle" class="sub">FC03 读 / FC06 写单个 / FC16 写多个</text>

  <line x1="360" y1="222" x2="360" y2="244" class="line" marker-end="url(#ar)"/>

  <!-- Step 4: 发送 -->
  <rect x="220" y="246" width="280" height="38" class="box"/>
  <text x="360" y="270" text-anchor="middle" class="name">串口发送请求帧</text>

  <line x1="360" y1="284" x2="360" y2="306" class="line" marker-end="url(#ar)"/>

  <!-- Step 5: 等待响应 -->
  <rect x="220" y="308" width="280" height="44" class="box"/>
  <text x="360" y="326" text-anchor="middle" class="name">等待响应 (500ms 超时)</text>
  <text x="360" y="342" text-anchor="middle" class="sub">Promise.race([readData, timeout])</text>

  <line x1="360" y1="352" x2="360" y2="374" class="line" marker-end="url(#ar)"/>

  <!-- Step 6: 判断 -->
  <polygon points="360,376 440,406 360,436 280,406" class="dia"/>
  <text x="360" y="410" text-anchor="middle" class="sub">CRC 正确?</text>

  <!-- 失败 → 右侧 -->
  <line x1="440" y1="406" x2="530" y2="406" class="line" marker-end="url(#ar)"/>
  <text x="480" y="398" text-anchor="middle" class="sub">否</text>
  <rect x="532" y="388" width="150" height="36" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="607" y="410" text-anchor="middle" class="sub">抛出异常</text>

  <!-- 成功 → 向下 -->
  <line x1="360" y1="436" x2="360" y2="458" class="line" marker-end="url(#ar)"/>
  <text x="345" y="450" text-anchor="end" class="sub">是</text>

  <!-- Step 7: 解析 -->
  <rect x="220" y="460" width="280" height="38" class="box"/>
  <text x="360" y="484" text-anchor="middle" class="name">解析响应，记录通信日志</text>

  <line x1="360" y1="498" x2="360" y2="520" class="line" marker-end="url(#ar)"/>

  <!-- Step 8: 完成 -->
  <rect x="220" y="522" width="280" height="38" class="hl"/>
  <text x="360" y="546" text-anchor="middle" class="name">帧间延时 15ms → 释放队列锁</text>

  <!-- 左侧注释: 事务队列 -->
  <rect x="16" y="100" width="180" height="100" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="106" y="120" text-anchor="middle" class="name">事务队列机制</text>
  <line x1="26" y1="126" x2="186" y2="126" class="line"/>
  <text x="26" y="144" class="sub">Modbus 半双工协议</text>
  <text x="26" y="160" class="sub">同时仅一个事务执行</text>
  <text x="26" y="176" class="sub">FIFO 队列串行化</text>
  <polyline points="196,135 220,135" class="line" stroke-dasharray="3,3"/>
</svg>
